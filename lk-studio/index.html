<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E0E10" />

  <title>Diagnóstico financiero — LK Studio</title>
  <meta name="description" content="La radiografía financiera del salón. Qué te deja plata. Qué te la come. Y cuánto vale arreglarlo." />

  <!-- Open Graph (WhatsApp / LinkedIn / Twitter preview) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Diagnóstico financiero — LK Studio" />
  <meta property="og:description" content="La radiografía financiera de tu salón. Qué te deja plata. Qué te la come. Y cuánto vale arreglarlo." />
  <meta property="og:image" content="./assets/img/og-lk-studio.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="es_CL" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Diagnóstico financiero — LK Studio" />
  <meta name="twitter:description" content="La radiografía financiera de tu salón." />
  <meta name="twitter:image" content="./assets/img/og-lk-studio.png" />

  <!-- Favicon emoji (placeholder, ligero) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 font-style=%22italic%22 font-family=%22Georgia%22>L</text></svg>" />

  <!-- Fonts: Cormorant Garamond (display) + Manrope (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Manrope:wght@400;500;600;700;800&display=swap"
  />

  <!-- Tailwind CSS (CDN) — solo para utilidades de layout y spacing residuales -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['Manrope', 'system-ui', 'sans-serif']
          },
          colors: {
            lk: {
              noir: '#0E0E10',
              'noir-soft': '#1A1A1F',
              champagne: '#C8A96E',
              'champagne-dark': '#A6884F',
              'champagne-light': '#E2CDA0',
              rose: '#D9B5A0',
              nude: '#EFE5DA',
              ivory: '#FBF8F3',
              bordeaux: '#7B2D26',
              rojo: '#C0392B',
              ambar: '#D4A028',
              verde: '#3D7C5A'
            }
          }
        }
      }
    };
  </script>

  <!-- AOS — animaciones on-scroll -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

  <!-- Theme propio -->
  <link rel="stylesheet" href="./assets/css/theme.css" />
</head>

<body x-data="dashboard()" x-init="init()" x-cloak>

  <!-- Banner DEMO sticky -->
  <div class="lk-banner-demo" x-text="data.hero?.demo_banner || 'DEMO · cifras ilustrativas'"></div>

  <!-- Sticky header (visible al scroll) -->
  <header class="lk-sticky-header" :class="{ 'is-visible': stickyVisible }">
    <a href="#hero" class="lk-sticky-wordmark" x-text="data.hero?.wordmark || 'LK Studio'"></a>
    <a :href="'https://wa.me/' + (data.meta?.consultor_whatsapp || '+56978837430').replace(/[^0-9]/g, '') + '?text=' + encodeURIComponent('Hola, vi el demo del diagnóstico de LK Studio y quiero conversar')"
       class="lk-sticky-cta" target="_blank" rel="noopener">
      <svg class="lk-fab-icon" style="width:18px;height:18px" viewBox="0 0 24 24" fill="currentColor">
        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.371-.025-.52-.075-.149-.669-1.611-.916-2.206-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.71.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/>
      </svg>
      WhatsApp
    </a>
  </header>

  <!-- ============================================ -->
  <!-- 1. HERO — La radiografía financiera           -->
  <!-- ============================================ -->
  <section id="hero" class="lk-hero">
    <div class="lk-wordmark" data-aos="fade-down" data-aos-duration="800">
      <div class="lk-wordmark-main" x-text="data.hero?.wordmark || 'LK Studio'"></div>
      <div class="lk-wordmark-divider"></div>
      <div class="lk-wordmark-sub" x-text="data.hero?.wordmark_sub || ''"></div>
    </div>

    <h1 class="lk-hero-headline" data-aos="fade-up" data-aos-delay="200" x-text="data.hero?.headline || 'La radiografía financiera de tu salón.'"></h1>

    <p class="lk-hero-subhead" data-aos="fade-up" data-aos-delay="400" x-text="data.hero?.subhead || ''"></p>

    <div class="lk-hero-kpis" data-aos="fade-up" data-aos-delay="600">
      <div class="lk-hero-kpi">
        <div class="lk-hero-kpi-label" x-text="data.hero?.kpi_strip_label || ''"></div>
      </div>
      <div class="lk-hero-kpi">
        <div class="lk-hero-kpi-label" x-text="data.hero?.kpi_strip_facturado_label || 'Facturado'"></div>
        <div class="lk-hero-kpi-value" x-text="formatCLP(data.hero?.kpi_strip_facturado_valor)"></div>
      </div>
      <div class="lk-hero-kpi">
        <div class="lk-hero-kpi-label" x-text="data.hero?.kpi_strip_utilidad_label || 'Utilidad real'"></div>
        <div class="lk-hero-kpi-value" x-text="formatCLP(data.hero?.kpi_strip_utilidad_valor)"></div>
      </div>
    </div>

    <div style="text-align:center" data-aos="fade-up" data-aos-delay="800">
      <a :href="'https://wa.me/' + (data.meta?.consultor_whatsapp || '+56978837430').replace(/[^0-9]/g, '') + '?text=' + encodeURIComponent('Hola, vi el demo de LK Studio y quiero el diagnóstico con mis números reales.')"
         class="lk-btn-primary" target="_blank" rel="noopener">
        <span x-text="data.hero?.cta_primary || 'Quiero este diagnóstico con mis números reales'"></span>
        <span aria-hidden="true">→</span>
      </a>
    </div>

    <a href="#tres-luces" class="lk-scroll-arrow">
      <span x-text="data.hero?.cta_scroll || 'Recorre tu negocio'"></span>
      <span aria-hidden="true">↓</span>
    </a>
  </section>

  <!-- ============================================ -->
  <!-- 2. TRES LUCES — Semáforo emocional XL         -->
  <!-- ============================================ -->
  <section id="tres-luces" class="lk-section lk-section-noir">
    <div class="max-w-6xl mx-auto">
      <div data-aos="fade-up">
        <div class="lk-eyebrow">Estado · Mayo 2026</div>
        <h2 class="lk-section-title" x-text="data.tres_luces?.section_title || 'El estado de tu salón en 3 luces.'"></h2>
        <p class="lk-section-intro" x-text="data.tres_luces?.section_intro || ''"></p>
      </div>

      <div class="lk-tres-luces">
        <template x-for="(luz, idx) in (data.tres_luces?.luces || [])" :key="idx">
          <div class="lk-luz-card" :class="'lk-luz-' + luz.color"
               data-aos="fade-up" :data-aos-delay="100 + (idx * 100)">
            <div class="lk-luz-etiqueta" x-text="luz.etiqueta"></div>
            <div class="lk-luz-titulo" x-text="luz.titulo"></div>
            <div class="lk-luz-metrica" x-text="luz.metrica_principal"></div>
            <p class="lk-luz-detalle" x-text="luz.detalle"></p>
            <div class="lk-luz-accion">
              <span class="lk-luz-accion-label">Acción</span>
              <span x-text="luz.accion"></span>
            </div>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- 3. TUS NÚMEROS — KPI dashboard + gauge        -->
  <!-- ============================================ -->
  <section id="numeros" class="lk-section lk-section-ivory">
    <div class="max-w-6xl mx-auto">
      <div data-aos="fade-up">
        <div class="lk-eyebrow">Resumen ejecutivo</div>
        <h2 class="lk-section-title" x-text="data.estado_general?.section_title || 'Tus números este mes.'"></h2>
        <p class="lk-section-intro" x-text="data.estado_general?.section_intro || ''"></p>
      </div>

      <div class="lk-kpi-grid">
        <template x-for="(kpi, idx) in (data.kpis || [])" :key="kpi.id">
          <div class="lk-kpi-card" :class="'lk-kpi-card-' + kpi.color_borde"
               data-aos="fade-up" :data-aos-delay="100 + (idx * 80)">
            <div class="lk-kpi-label" x-text="kpi.label"></div>
            <div class="lk-kpi-value" x-text="formatValue(kpi.valor, kpi.formato)"></div>
            <div class="lk-kpi-trend" :class="'lk-kpi-trend-' + kpi.trend">
              <span x-show="kpi.trend === 'up'" aria-hidden="true">▲</span>
              <span x-show="kpi.trend === 'down'" aria-hidden="true">▼</span>
              <span x-show="kpi.trend === 'flat'" aria-hidden="true">→</span>
              <span x-text="kpi.trend_texto"></span>
            </div>
          </div>
        </template>
      </div>

      <!-- Gauge + mensaje -->
      <div class="lk-gauge-block" data-aos="fade-up" data-aos-delay="500">
        <div class="lk-gauge-canvas-wrapper">
          <canvas id="gauge-pe" width="220" height="220"></canvas>
          <div class="lk-gauge-pct" x-text="Math.round((data.estado_general?.pe_pct_alcanzado || 0) * 100) + '%'"></div>
        </div>
        <div class="lk-gauge-label" x-text="data.estado_general?.gauge_label || ''"></div>
        <div class="lk-gauge-subtext" x-text="data.estado_general?.gauge_subtext || ''"></div>
      </div>

      <p class="text-center text-xs text-lk-noir/50 mt-8 italic" x-text="data.estado_general?.footnote || ''"></p>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- 4. RANKING — Héroes y enemigos silenciosos    -->
  <!-- ============================================ -->
  <section id="ranking" class="lk-section lk-section-nude">
    <div class="max-w-6xl mx-auto">
      <div data-aos="fade-up">
        <div class="lk-eyebrow">Servicios</div>
        <h2 class="lk-section-title" x-text="data.ranking_servicios?.section_title || 'Quién te hace ganar plata.'"></h2>
        <p class="lk-section-intro" x-text="data.ranking_servicios?.section_intro || ''"></p>
      </div>

      <div class="lk-ranking-grid">
        <!-- Héroes -->
        <div class="lk-ranking-col lk-ranking-col-heroes" data-aos="fade-right" data-aos-delay="200">
          <div class="lk-ranking-col-titulo" x-text="data.ranking_servicios?.heroes_titulo || 'Los que te sostienen'"></div>
          <p class="lk-ranking-col-intro" x-text="data.ranking_servicios?.heroes_intro || ''"></p>
          <template x-for="(s, idx) in topServicios()" :key="s.id">
            <div class="lk-ranking-item">
              <div class="lk-ranking-item-info">
                <div class="lk-ranking-item-nombre">
                  <span x-text="(idx + 1) + '.'"></span>
                  <span x-text="s.nombre"></span>
                </div>
                <div class="lk-ranking-item-meta">
                  <span x-text="'margen ' + Math.round(s.margen_pct * 100) + '% · ' + s.cantidad_mes + ' al mes'"></span>
                </div>
              </div>
              <div class="lk-ranking-item-valor" x-text="formatCLP(s.contribucion)"></div>
            </div>
          </template>
        </div>

        <!-- Enemigos -->
        <div class="lk-ranking-col lk-ranking-col-enemigos" data-aos="fade-left" data-aos-delay="200">
          <div class="lk-ranking-col-titulo" x-text="data.ranking_servicios?.enemigos_titulo || 'Los enemigos silenciosos'"></div>
          <p class="lk-ranking-col-intro" x-text="data.ranking_servicios?.enemigos_intro || ''"></p>
          <template x-for="(s, idx) in bottomServicios()" :key="s.id">
            <div class="lk-ranking-item">
              <div class="lk-ranking-item-info">
                <div class="lk-ranking-item-nombre">
                  <span x-text="(idx + 1) + '.'"></span>
                  <span x-text="s.nombre"></span>
                </div>
                <div class="lk-ranking-item-meta">
                  <span x-text="'margen ' + Math.round(s.margen_pct * 100) + '% · ' + s.cantidad_mes + ' al mes'"></span>
                </div>
              </div>
              <div class="lk-ranking-item-valor" x-text="formatCLP(s.contribucion)"></div>
            </div>
          </template>
        </div>
      </div>

      <div class="lk-bottom-line" data-aos="fade-up" data-aos-delay="400" x-text="data.ranking_servicios?.bottom_line || ''"></div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- 5. PRODUCTOS CLOE                              -->
  <!-- ============================================ -->
  <section id="productos" class="lk-section lk-section-ivory">
    <div class="max-w-6xl mx-auto">
      <div data-aos="fade-up">
        <div class="lk-eyebrow">Retail · Línea CLOE</div>
        <h2 class="lk-section-title" x-text="data.productos_resumen?.section_title || 'Productos CLOE.'"></h2>
        <p class="lk-section-intro" x-text="data.productos_resumen?.section_intro || ''"></p>
      </div>

      <div class="lk-productos-grid" data-aos="fade-up" data-aos-delay="200">
        <template x-for="p in (data.productos_cloe || [])" :key="p.id">
          <div class="lk-producto-row">
            <div>
              <div class="lk-producto-nombre" x-text="p.nombre"></div>
              <div class="lk-producto-meta">
                <span x-text="'precio ' + formatCLP(p.precio) + ' · margen ' + Math.round(p.margen_pct * 100) + '% · ' + p.ventas_mes + ' u/mes · stock ' + p.stock"></span>
              </div>
            </div>
            <div class="lk-producto-contribucion" x-text="formatCLP(p.contribucion)"></div>
            <div>
              <span class="lk-badge" :class="'lk-badge-' + p.estado" x-text="p.estado === 'verde' ? 'OK' : (p.estado === 'amarillo' ? 'Revisar' : 'Liquidar')"></span>
            </div>
          </div>
        </template>
      </div>

      <div class="lk-stock-dormido" data-aos="fade-up" data-aos-delay="300" x-show="data.productos_resumen?.stock_dormido_titulo">
        <div class="lk-stock-dormido-titulo" x-text="data.productos_resumen?.stock_dormido_titulo || ''"></div>
        <div class="lk-stock-dormido-detalle" x-text="data.productos_resumen?.stock_dormido_detalle || ''"></div>
        <div class="text-sm text-lk-noir/70" x-text="data.productos_resumen?.stock_dormido_accion || ''"></div>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- 6. EQUIPO — Personas                            -->
  <!-- ============================================ -->
  <section id="equipo" class="lk-section lk-section-nude">
    <div class="max-w-6xl mx-auto">
      <div data-aos="fade-up">
        <div class="lk-eyebrow">Personas</div>
        <h2 class="lk-section-title" x-text="data.personas_resumen?.section_title || 'Tu equipo.'"></h2>
        <p class="lk-section-intro" x-text="data.personas_resumen?.section_intro || ''"></p>
      </div>

      <div class="lk-personas-grid">
        <template x-for="(p, idx) in (data.personas || [])" :key="p.id">
          <div class="lk-persona-card" :class="{ 'lk-persona-card-flagged': p.bandera_legal }"
               data-aos="fade-up" :data-aos-delay="100 + (idx * 80)">
            <div class="lk-persona-rol" x-text="p.rol"></div>
            <div class="lk-persona-modalidad" x-text="p.modalidad"></div>

            <div class="lk-persona-stat">
              <span class="lk-persona-stat-label">Costo real</span>
              <span class="lk-persona-stat-valor" x-text="formatCLP(p.costo_real_mensual)"></span>
            </div>
            <div class="lk-persona-stat" x-show="p.ventas_generadas > 0">
              <span class="lk-persona-stat-label">Ventas generadas</span>
              <span class="lk-persona-stat-valor" x-text="formatCLP(p.ventas_generadas)"></span>
            </div>
            <div class="lk-persona-stat" x-show="p.productividad_pct !== null && p.productividad_pct !== undefined">
              <span class="lk-persona-stat-label">Productividad</span>
              <span class="lk-persona-stat-valor" :class="p.productividad_pct >= 0.4 ? 'text-lk-verde' : 'text-lk-ambar'" x-text="Math.round((p.productividad_pct || 0) * 100) + '%'"></span>
            </div>

            <div class="lk-persona-bandera" x-show="p.bandera_legal" x-text="p.bandera_legal"></div>
          </div>
        </template>
      </div>

      <div class="lk-peso-banner" data-aos="fade-up" data-aos-delay="400">
        <div class="lk-peso-num" x-text="Math.round((data.personas_resumen?.peso_remuneraciones_pct || 0) * 100) + '%'"></div>
        <div class="lk-peso-mensaje" x-text="data.personas_resumen?.mensaje_peso || ''"></div>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- 7. SIMULADORES                                 -->
  <!-- ============================================ -->
  <section id="simuladores" class="lk-section lk-section-noir">
    <div class="max-w-6xl mx-auto">
      <div data-aos="fade-up">
        <div class="lk-eyebrow">Toca y mira el impacto</div>
        <h2 class="lk-section-title" x-text="data.simuladores?.section_title || 'Mueve los controles. Mira qué pasa.'"></h2>
        <p class="lk-section-intro" x-text="data.simuladores?.section_intro || ''"></p>
      </div>

      <!-- Simulador 1: precios -->
      <div class="lk-sim-block" x-data="simuladorPrecios()" data-aos="fade-up" data-aos-delay="100">
        <div class="lk-sim-eyebrow">Simulador 01</div>
        <h3 class="lk-sim-titulo" x-text="data.simulador_precios?.titulo || '¿Y si subo precios?'"></h3>
        <p class="lk-sim-subtitulo" x-text="data.simulador_precios?.subtitulo || ''"></p>

        <!-- Presets -->
        <div class="flex gap-2 flex-wrap mb-4">
          <template x-for="preset in (data.simulador_precios?.presets || [])" :key="preset.label">
            <button type="button" class="lk-preset-btn"
                    :class="{ 'lk-preset-btn-active': Math.abs(spPct - preset.valor_pct) < 0.001 }"
                    @click="spPct = preset.valor_pct">
              <span x-text="preset.label"></span>
              <span class="opacity-60 ml-1" x-text="'+' + Math.round(preset.valor_pct * 100) + '%'"></span>
            </button>
          </template>
        </div>

        <!-- Slider -->
        <div class="flex items-center gap-4 mt-4 mb-2">
          <span class="text-xs text-lk-champagne-light font-semibold tracking-wider uppercase" style="min-width:64px">
            <span x-text="(spPct >= 0 ? '+' : '') + Math.round(spPct * 100) + '%'"></span>
          </span>
          <input type="range"
                 class="lk-slider flex-1"
                 :min="data.simulador_precios?.rango_min_pct ?? -0.10"
                 :max="data.simulador_precios?.rango_max_pct ?? 0.20"
                 :step="data.simulador_precios?.step_pct ?? 0.01"
                 x-model.number="spPct" />
        </div>

        <!-- Resultados -->
        <div class="lk-sim-result-grid">
          <div class="lk-sim-result">
            <div class="lk-sim-result-label">Margen nuevo</div>
            <div class="lk-sim-result-valor" x-text="Math.round(spMargenNuevo() * 100) + '%'"></div>
          </div>
          <div class="lk-sim-result">
            <div class="lk-sim-result-label">Δ Utilidad / mes</div>
            <div class="lk-sim-result-valor" x-text="(spDeltaUtilidad() >= 0 ? '+' : '') + formatCLP(spDeltaUtilidad())"></div>
          </div>
          <div class="lk-sim-result">
            <div class="lk-sim-result-label">PE nuevo</div>
            <div class="lk-sim-result-valor" x-text="formatCLP(spPENuevo())"></div>
          </div>
          <div class="lk-sim-result">
            <div class="lk-sim-result-label">Servicios afectados</div>
            <div class="lk-sim-result-valor" x-text="(data.simulador_precios?.servicios_aplicables_ids?.length || 0) + ' / ' + (data.servicios?.length || 0)"></div>
          </div>
        </div>

        <p class="lk-sim-supuesto" x-text="data.simulador_precios?.supuesto_elasticidad || ''"></p>
      </div>

      <!-- Simulador 2: contratación -->
      <div class="lk-sim-block" x-data="simuladorContratacion()" data-aos="fade-up" data-aos-delay="200" style="margin-top:2rem">
        <div class="lk-sim-eyebrow">Simulador 02</div>
        <h3 class="lk-sim-titulo" x-text="data.simulador_contratacion?.titulo || '¿Y si contrato a alguien más?'"></h3>
        <p class="lk-sim-subtitulo" x-text="data.simulador_contratacion?.subtitulo || ''"></p>

        <table class="lk-sim-tabla">
          <thead>
            <tr>
              <th>Escenario</th>
